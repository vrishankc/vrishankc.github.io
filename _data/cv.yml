    Projects:
      - name: "Discovery of a Novel Digital Biomarker for Early Pan-Cancer Survival and Recurrence Prediction via Free-Text Clinical Narratives"
        summary: "Used natural language processing to assess the use of free-text clinical narratives in fitting survival and recurrence outcomes for pan-cancer patients at initial diagnosis, enabling risk stratification across 32 cancer types. Earned top awards at 2025 International Science and Engineering Fair. Named a Top-300 Scholar in the 2025 Regeneron Science Talent Search (STS)."
        highlights: []

      - name: "Investigating the Role of TBX4 Loss-of-Function in Pulmonary Arterial Hypertension (PAH)"
        summary: "Developed an automated RNA-sequencing differential expression and functional analysis application, using co-culture models of stem-cell differentiated wild-type and mutated endothelial and smooth muscle cells, to study how TBX4 loss-of-function mutations can lead to a PAH phenotype."
        highlights: []

